services:
  # 1. The Public Web Server (Bun/Hono)
  web-app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres-db:5432/laptop_db
    depends_on:
      postgres-db:
        condition: service_healthy
      
  # 2. The PostgreSQL Database
  postgres-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=laptop_db
    ports:
      - "5432:5432" # Expose to your host machine for data inspection tools like DBeaver
    volumes:
      - pg-data:/var/lib/postgresql/data # Persists the database data
      - ./postgres:/docker-entrypoint-initdb.d # Auto-runs your schema on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laptop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. The LLM Server (Ollama)
  llm-server:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama # Prevents re-downloading the model on every restart

volumes:
  pg-data:
  ollama-models:
